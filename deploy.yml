name: Deploy Laravel CRM

on:
  push:
    branches:
      - main   

jobs:
  web-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.topscripts.in
          username: dev@avengers.topscripts.in
          password: ${{ secrets.FTPPASSWORD }}
          protocol: ftps
          server-dir: https://avengers.topscripts.in/harsh/laravel-CRM
